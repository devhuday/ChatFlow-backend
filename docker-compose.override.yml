# docker-compose.override.yml
# Se usa automáticamente en desarrollo local
# Comando: docker-compose up -d

services:
  backend:
    depends_on:
      - postgres
      - evolution_api

  postgres:
    image: postgres:15-alpine
    container_name: bot_wp_postgres
    restart: always
    environment:
      POSTGRES_USER: bot_wp
      POSTGRES_PASSWORD: bot_wp_password
      POSTGRES_DB: bot_wp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  evolution_api:
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://bot_wp:bot_wp_password@postgres:5432/bot_wp_db?schema=evolution

volumes:
  pgdata:
