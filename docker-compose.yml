
services:
  backend:
    build: .
    container_name: bot_wp_backend
    restart: always
    ports:
      - "3000:3000"
      - "5555:5555"
    environment:
      - PORT=${PORT:-3000}
      - DATABASE_URL=${DATABASE_URL}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - CLERK_JWT_KEY=${CLERK_JWT_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
    depends_on:
      - postgres
      - evolution_api

  postgres:
    image: postgres:15-alpine
    container_name: bot_wp_postgres
    restart: always
    environment:
      POSTGRES_USER: bot_wp
      POSTGRES_PASSWORD: bot_wp_password
      POSTGRES_DB: bot_wp_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8081:8080" # Mapea el puerto 8080 del contenedor al 8081 del host
    environment:
      - SERVER_URL=http://localhost:8080
      - LOG_LEVEL=CLIENT,ERROR,WARN,INFO,LOG
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://bot_wp:bot_wp_password@postgres:5432/bot_wp_db?schema=evolution
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:alpine
    container_name: bot_wp_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
